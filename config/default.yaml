# 🌍 Dynamic Agentic Engineering System Configuration

# LLM Global Defaults
llm:
  provider: "openai"  # Global default provider: "openai" or "bedrock"
  default_model: "gpt-4o-mini"
  default_temperature: 0.0
  max_retries: 5
  region: "ap-northeast-1"  # Default region for Bedrock (Tokyo)
  # Agent-specific overrides
  agents:
    planner:
      provider: "bedrock"
      model: "deepseek.v3-v1:0"
      temperature: 0.1
    coder:
      model: "gpt-4o-mini"
      temperature: 0.0
    ops:
      model: "gpt-4o-mini"
      temperature: 0.0
    growth:
      provider: "bedrock"
      model: "anthropic.claude-3-haiku-20240307-v1:0"
      temperature: 0.0
    supervisor:
      model: "gpt-4o-mini"
      temperature: 0.0

# Agent Operational Limits
agents:
  coder:
    max_tool_calls: 20
    max_duplicate_rounds: 3
  ops:
    max_tool_calls: 10
  growth:
    max_tool_calls: 10

# Workflow Orchestration
workflow:
  max_rework_attempts: 3
  max_follow_up_depth: 2
