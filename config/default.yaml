# 🌍 Dynamic Agentic Engineering System Configuration

# LLM Global Defaults
llm:
  provider: "openai"
  default_model: "gpt-4o-mini"
  default_temperature: 0.0
  max_retries: 5
  region: "us-east-1" 
  thinking: false
  thinking_budget: 32000
  use_langfuse_prompts: true
  # Agent-specific overrides (Simplified for quick testing)
  agents:
    planner:
      provider: "openai"
      model: "gpt-4o-mini"
      temperature: 0.0
    coder:
      provider: "openai"
      model: "gpt-4o-mini"  # Slightly better for coding even in default mode
      temperature: 0.0
    ops:
      provider: "openai"
      model: "gpt-4o-mini"
      temperature: 0.0
    growth:
      provider: "openai"
      model: "gpt-4o-mini"
      temperature: 0.0
    supervisor:
      provider: "openai"
      model: "gpt-4o-mini"
      temperature: 0.0

# Agent Operational Limits
agents:
  coder:
    max_tool_calls: 20
    max_duplicate_rounds: 3
  ops:
    max_tool_calls: 10
  growth:
    max_tool_calls: 10

# Workflow Orchestration
workflow:
  max_rework_attempts: 1
  max_follow_up_depth: 2

# Smart Context Manager Ingestion
ingestion:
  connectors:
    github:
      enabled: true
      timeout: 30
    google_drive:
      enabled: true
      timeout: 30
    slack:
      enabled: true
      timeout: 30
    pdf:
      enabled: true
      timeout: 30
